<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Dashboard Diagnosis ODS — IES San Vicente{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <span class="header-icon">🔧</span>
      <h1 class="header-title">Dashboard de Diagnosis de Vehículos</h1>
      <span class="header-subtitle">IES San Vicente · Proyecto Interdepartamental FP</span>
    </div>
  </header>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="app-footer">
    <p>Dashboard de Diagnosis con IA Generativa · Google Sheets · ODS</p>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
